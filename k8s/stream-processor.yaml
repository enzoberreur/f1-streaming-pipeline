apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor
  namespace: ferrari-f1
  labels:
    app: stream-processor
    app.kubernetes.io/name: ferrari-f1
    app.kubernetes.io/component: processing
spec:
  replicas: 2                 # matches the HPA minReplicas (it then scales 2 -> 10)
  selector:
    matchLabels:
      app: stream-processor
  template:
    metadata:
      labels:
        app: stream-processor
    spec:
      serviceAccountName: stream-processor-sa   # RBAC minimal dédié (voir rbac.yaml)
      containers:
      - name: stream-processor
        # Image published by CI to GHCR (see .github/workflows/ci-cd.yml).
        # If the GHCR package is private, attach an imagePullSecret to this pod.
        image: ghcr.io/enzoberreur/f1-streaming-pipeline/stream-processor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8001
        env:
        - name: PROCESSOR_MODE
          value: "rest"
        - name: PORT
          value: "8001"
        - name: STREAM_PROCESSOR_API_KEY_HEADER
          value: "X-Api-Key"
        - name: STREAM_PROCESSOR_API_KEY
          valueFrom:
            secretKeyRef:
              name: ferrari-f1-secrets
              key: api-key
        # Persistance vers le schéma opérationnel (sql/ddl) dans PostgreSQL
        - name: ENABLE_DB_WRITES
          value: "true"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ferrari-f1-secrets
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"        # a CPU request is required for the HPA CPU target to work
          limits:
            memory: "512Mi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: stream-processor
  namespace: ferrari-f1
  labels:
    app: stream-processor
    app.kubernetes.io/name: ferrari-f1
    app.kubernetes.io/component: processing
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8001
    targetPort: 8001
    protocol: TCP
  selector:
    app: stream-processor
