version: '3.8'

services:
  # Service de simulation des capteurs Ferrari F1
  sensor-simulator:
    build:
      context: ./sensor-simulator
      dockerfile: Dockerfile
    container_name: ferrari-sensor-simulator
    environment:
      - SIMULATION_MODE=championship
      - HTTP_ENDPOINT=http://ferrari-stream-processor:8001/telemetry
      - TARGET_THROUGHPUT_PER_CAR=250
      - STREAM_PROCESSOR_API_KEY_HEADER=X-Api-Key
      - STREAM_PROCESSOR_API_KEY=${STREAM_PROCESSOR_API_KEY:-changeme}
    ports:
      - "8000:8000"
    depends_on:
      - stream-processor
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/metrics', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ferrari-network

  # Service de traitement des flux de données
  stream-processor:
    build:
      context: ./stream-processor
      dockerfile: Dockerfile
    container_name: ferrari-stream-processor
    environment:
      - PROCESSOR_MODE=rest
      - PORT=8001
      - STREAM_PROCESSOR_API_KEY=${STREAM_PROCESSOR_API_KEY:-changeme}
      - STREAM_PROCESSOR_API_KEY_HEADER=X-Api-Key
      # Persistance vers le schéma opérationnel (sql/ddl) dans PostgreSQL
      - ENABLE_DB_WRITES=${ENABLE_DB_WRITES:-true}
      - DATABASE_URL=postgresql://airflow:airflow@postgres:5432/airflow
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ferrari-network

  # PostgreSQL pour Airflow
  postgres:
    image: postgres:14
    container_name: ferrari-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Schéma opérationnel + star schema appliqués au premier démarrage
      # (volume vierge; faire `docker compose down -v` pour réinitialiser)
      - ./sql/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ferrari-network

  # Redis pour Airflow
  redis:
    image: redis:7
    container_name: ferrari-redis
    networks:
      - ferrari-network

  # Airflow Webserver
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: ferrari-airflow-webserver
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Ferrari --lastname F1 --role Admin --email admin@ferrari.com &&
               airflow webserver"
    ports:
      - "8088:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=ferrari_secret_key_2025
    depends_on:
      - postgres
      - redis
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    restart: unless-stopped
    networks:
      - ferrari-network

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: ferrari-airflow-scheduler
    command: airflow scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    depends_on:
      - postgres
      - redis
      - airflow-webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    restart: unless-stopped
    networks:
      - ferrari-network

  # Service de monitoring
  monitoring:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: ferrari-monitoring
    environment:
      - MONITOR_INTERVAL=15
    restart: unless-stopped
    networks:
      - ferrari-network

  # Prometheus pour les métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: ferrari-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
      - ./monitoring/rules:/prometheus-rules
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ferrari-network

  # Grafana pour la visualisation
  grafana:
    image: grafana/grafana:latest
    container_name: ferrari-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PROVISIONING_PATH=/etc/grafana/provisioning
      # Plugins are not downloaded at runtime: the provisioned dashboards use only
      # built-in panels, and runtime install fails behind a TLS-inspecting proxy.
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana-dashboards-provisioning.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/grafana_dashboard_main.json:/etc/grafana/dashboards/main.json
      - ./monitoring/grafana_dashboard_strategy.json:/etc/grafana/dashboards/strategy.json
      - ./monitoring/grafana_dashboard_data.json:/etc/grafana/dashboards/data.json
      - ./monitoring/grafana_dashboard_data_quality.json:/etc/grafana/dashboards/data_quality.json
      - ./monitoring/grafana_dashboard_engineer.json:/etc/grafana/dashboards/engineer.json
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - ferrari-network

  # cAdvisor - Métriques des conteneurs
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: ferrari-cadvisor
    ports:
      - "8083:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: unless-stopped
    networks:
      - ferrari-network
    command:
      - '--housekeeping_interval=10s'
      - '--docker_only=true'

networks:
  ferrari-network:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs:
  prometheus-data:
  grafana-data:
