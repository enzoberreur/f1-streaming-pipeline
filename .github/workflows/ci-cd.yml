name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint & syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: python -m pip install --upgrade pip ruff

      - name: Syntax check (compileall)
        run: |
          python -m compileall -q \
            sensor-simulator/main.py \
            stream-processor/main.py \
            monitoring/app.py \
            airflow/dags

      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: ruff check sensor-simulator stream-processor monitoring airflow

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [sensor-simulator, stream-processor, monitoring, airflow]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name (lowercase)
        shell: bash
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/${{ matrix.service }}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-deploy:
    name: Validate compose & k8s manifests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config -q

      - name: Validate Kubernetes manifests (kubeconform)
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar -xz kubeconform
          ./kubeconform -summary -ignore-missing-schemas k8s/
